let currentView = '3year';
let currentFilter = 'all';
let searchTerm = '';

function getPlayers() {
    return currentView === '3year' ? players3year : players2year;
}

function getDiff(p) {
    return currentView === '3year' ? p.total_change : p.diff_inches;
}

function renderStats() {
    const players = getPlayers();
    const shrunk = players.filter(p => getDiff(p) < 0);
    const grew = players.filter(p => getDiff(p) > 0);
    const avgShrink = shrunk.length ? (shrunk.reduce((s,p) => s + getDiff(p), 0) / shrunk.length).toFixed(2) : 0;
    const changeRate = ((shrunk.length + grew.length) / players.length * 100).toFixed(1);

    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-number">${players.length}</div><div class="stat-label">Players Analyzed</div></div>
        <div class="stat-card"><div class="stat-number">${shrunk.length + grew.length}</div><div class="stat-label">Heights Changed</div></div>
        <div class="stat-card"><div class="stat-number negative">${shrunk.length}</div><div class="stat-label">Players Shrunk</div></div>
        <div class="stat-card"><div class="stat-number positive">${grew.length}</div><div class="stat-label">Players Grew</div></div>
        <div class="stat-card"><div class="stat-number negative">${avgShrink}"</div><div class="stat-label">Avg Shrinkage</div></div>
        <div class="stat-card"><div class="stat-number">${changeRate}%</div><div class="stat-label">Change Rate</div></div>
    `;
}

function renderExplainer() {
    const el = document.getElementById('explainer');
    if (currentView === '3year') {
        el.innerHTML = `
            <h3>What's going on?</h3>
            <p>For the 2026 season, MLB implemented the ABS (Automated Ball-Strike) challenge system. The strike zone is calculated based on each batter's <strong>measured height</strong>: 27% to 53.5% of their actual height.</p>
            <p>This meant players had to be officially measured, shoes off, back against the wall. For the first time, we have <em>actual</em> heights instead of self-reported numbers.</p>
            <p>This 3-year view tracks heights from <strong>2024</strong> (self-reported, via Baseball Reference Wayback Machine), <strong>2025</strong> (self-reported, via Baseball Reference Wayback Machine), and <strong>2026</strong> (ABS-measured, via MLB Stats API). 561 players appear in all three years.</p>
            <p>Turns out a lot of players were... optimistic about their heights.</p>
            <h3 style="margin-top:24px">Did ABS cause more shrinkage than normal?</h3>
            <p>No. Among these 561 players, <strong>more</strong> heights changed in the normal roster-churn year (2024-2025: 139 shrunk, 24.8%) than when ABS was introduced (2025-2026: 81 shrunk, 14.4%).</p>
            <p>But the <em>type</em> of shrinkage was different. <strong>60 players</strong> had stable or growing heights from 2024-2025, then shrunk under ABS. These are the ones whose inflation was only caught by real measurement. Meanwhile, 118 players shrunk in 2024-2025 but held steady under ABS, meaning the earlier correction already brought them to their true height.</p>
            <p><strong>The takeaway:</strong> ABS didn't cause more shrinkage than normal year-over-year corrections. It caught <em>different</em> players: the ones who had been consistently inflating their heights and never got corrected. Bo Naylor is the extreme case: listed at 6'0" for two straight years, measured at 5'9" when someone finally pulled out a tape measure.</p>
            <div class="legend">
                <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,107,107,0.3);border:1px dashed #ff6b6b"></div> 2024 (self-reported)</div>
                <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,193,7,0.3);border:1px dashed #ffc107"></div> 2025 (self-reported)</div>
                <div class="legend-item"><div class="legend-swatch" style="background:rgba(105,219,124,0.5);border:1px solid #69db7c"></div> 2026 (ABS measured)</div>
            </div>
        `;
    } else {
        el.innerHTML = `
            <h3>What's going on?</h3>
            <p>For the 2026 season, MLB implemented the ABS (Automated Ball-Strike) challenge system. The strike zone is now calculated precisely based on each batter's measured height: <strong>27% to 53.5%</strong> of their height.</p>
            <p>This meant players had to be officially measured, shoes off, back against the wall. For the first time, we have <em>actual</em> heights instead of the self-reported numbers that teams have used for decades.</p>
            <p>Turns out a lot of players were... optimistic about their heights.</p>
        `;
    }
}

function renderDistribution() {
    const players = getPlayers();
    const dist = {};
    const range = currentView === '3year' ? [-3,-2,-1,0,1] : [-3,-2,-1,0,1,2];
    range.forEach(v => { dist[v] = players.filter(p => getDiff(p) === v).length; });

    const maxDist = Math.max(...Object.values(dist));
    const container = document.getElementById('distribution');
    container.innerHTML = Object.entries(dist).map(([key, value]) => {
        const width = (value / maxDist) * 100;
        let barClass = 'zero';
        const k = parseInt(key);
        if (k < 0) barClass = 'negative';
        if (k > 0) barClass = 'positive';
        const label = k > 0 ? '+' + key : key;
        const pct = ((value / players.length) * 100).toFixed(1);
        return `
            <div class="dist-row">
                <div class="dist-label">${label}"</div>
                <div class="dist-bar-container">
                    <div class="dist-bar ${barClass}" style="width: ${width}%">
                        ${value} (${pct}%)
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function heightBarHeight(inches) {
    const minIn = 65, maxIn = 78;
    const minPx = 40, maxPx = 100;
    return Math.min(maxPx, Math.max(minPx, ((inches - minIn) / (maxIn - minIn)) * (maxPx - minPx) + minPx));
}

function renderPlayers(list) {
    const grid = document.getElementById('player-grid');
    list.sort((a, b) => getDiff(a) - getDiff(b));

    grid.innerHTML = list.map(p => {
        const diff = getDiff(p);
        const cardClass = diff < 0 ? 'shrunk' : diff > 0 ? 'grew' : '';
        const diffClass = diff < 0 ? 'negative' : diff > 0 ? 'positive' : '';
        const diffText = diff === 0 ? '0"' : (diff > 0 ? '+' : '') + diff + '"';

        if (currentView === '3year') {
            const bar24 = heightBarHeight(p.inches_2024);
            const bar25 = heightBarHeight(p.old_inches);
            const bar26 = heightBarHeight(p.new_inches);
            return `
                <div class="player-card ${cardClass}">
                    <div class="height-visual">
                        <div class="height-bar bar-2024" style="height: ${bar24}px"></div>
                        <div class="height-bar bar-2025" style="height: ${bar25}px"></div>
                        <div class="height-bar bar-2026" style="height: ${bar26}px"></div>
                    </div>
                    <div class="player-info">
                        <div class="player-name">${p.name}</div>
                        <div class="player-team">${p.position}</div>
                        <div class="player-heights">
                            <span class="height-2024">${p.height_2024}</span>
                            <span class="height-arrow">&rarr;</span>
                            <span class="height-2025">${p.old_height}</span>
                            <span class="height-arrow">&rarr;</span>
                            <span class="height-2026">${p.new_height}</span>
                            <span class="height-diff ${diffClass}">${diffText}</span>
                        </div>
                    </div>
                </div>
            `;
        } else {
            const oldBarH = heightBarHeight(p.old_inches);
            const newBarH = heightBarHeight(p.new_inches);
            return `
                <div class="player-card ${cardClass}">
                    <div class="height-visual">
                        <div class="height-bar old" style="height: ${oldBarH}px"></div>
                        <div class="height-bar new" style="height: ${newBarH}px"></div>
                    </div>
                    <div class="player-info">
                        <div class="player-name">${p.name}</div>
                        <div class="player-team">${p.team} &middot; ${p.position}</div>
                        <div class="player-heights">
                            <span class="height-old">${p.old_height}</span>
                            <span class="height-arrow">&rarr;</span>
                            <span class="height-new">${p.new_height}</span>
                            <span class="height-diff ${diffClass}">${diffText}</span>
                        </div>
                    </div>
                </div>
            `;
        }
    }).join('');
}

function filterPlayers() {
    let list = getPlayers();
    if (currentFilter === 'shrunk') list = list.filter(p => getDiff(p) < 0);
    else if (currentFilter === 'grew') list = list.filter(p => getDiff(p) > 0);
    else if (currentFilter === 'same') list = list.filter(p => getDiff(p) === 0);
    if (searchTerm) {
        const term = searchTerm.toLowerCase();
        list = list.filter(p => p.name.toLowerCase().includes(term) || (p.team && p.team.toLowerCase().includes(term)));
    }
    renderPlayers(list);
}

function renderAll() {
    renderStats();
    renderExplainer();
    renderDistribution();
    filterPlayers();
}

document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        renderAll();
    });
});

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterPlayers();
    });
});

document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    filterPlayers();
});

renderAll();
document.querySelector('[data-filter="all"]').classList.add('active');
    </script>
